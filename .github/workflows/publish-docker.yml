name: Publish Docker Images

on:
  push:
    tags:
      - '*'  # 匹配所有非 npm- 前缀的 tag（如 2026.4.19-0825）
      - '!npm-*'  # 排除 npm 包的 tag
  workflow_dispatch:
    inputs:
      skip_dockerhub:
        description: '跳过 Docker Hub 推送'
        required: false
        default: 'false'
      skip_acr:
        description: '跳过阿里云 ACR 推送'
        required: false
        default: 'false'

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: dmla-sandbox
  DOCKERHUB_NAMESPACE: icyfenix
  ACR_REGISTRY: crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com
  ACR_NAMESPACE: fenixsoft

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        type: [cpu, gpu]
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Extract shared modules
        run: npm run extract:shared

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.type }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: local-server/Dockerfile.sandbox${{ matrix.type == 'cpu' && '.cpu' || '' }}
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.type }}
          outputs: type=docker,dest=/tmp/image-${{ matrix.type }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          docker load -i /tmp/image-${{ matrix.type }}.tar
          docker run --rm ${{ env.IMAGE_NAME }}:${{ matrix.type }} python3 -c "print('Image OK')"

      - name: Upload image artifact
        uses: actions/upload-artifact@v5
        with:
          name: image-${{ matrix.type }}
          path: /tmp/image-${{ matrix.type }}.tar
          retention-days: 1

  push-dockerhub:
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ always() && github.event.inputs.skip_dockerhub != 'true' && needs.build-images.result == 'success' }}
    strategy:
      matrix:
        type: [cpu, gpu]
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Download image artifact
        uses: actions/download-artifact@v5
        with:
          name: image-${{ matrix.type }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image-${{ matrix.type }}.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push images
        run: |
          DOCKERHUB_NAMESPACE="icyfenix"
          IMAGE_NAME="dmla-sandbox"

          docker tag ${IMAGE_NAME}:${{ matrix.type }} \
            ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${{ matrix.type }}
          docker push ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${{ matrix.type }}

          echo "✅ Pushed to Docker Hub:"
          echo "  - ${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${{ matrix.type }}"

  push-acr:
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ always() && github.event.inputs.skip_acr != 'true' && needs.build-images.result == 'success' }}
    strategy:
      matrix:
        type: [cpu, gpu]
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Download image artifact
        uses: actions/download-artifact@v5
        with:
          name: image-${{ matrix.type }}
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image-${{ matrix.type }}.tar

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v4
        with:
          registry: crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Tag and push images to ACR
        run: |
          ACR_REGISTRY="crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com"
          ACR_NS="fenixsoft"
          IMAGE_NAME="dmla-sandbox"

          docker tag ${IMAGE_NAME}:${{ matrix.type }} \
            ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${{ matrix.type }}
          docker push ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${{ matrix.type }}

          echo "✅ Pushed to ACR:"
          echo "  - ${ACR_REGISTRY}/${ACR_NS}/${IMAGE_NAME}:${{ matrix.type }}"

  update-fc:
    runs-on: ubuntu-latest
    needs: push-acr
    if: ${{ always() && needs.push-acr.result == 'success' }}
    steps:
      - name: Setup Aliyun CLI
        run: curl -fsSL https://aliyuncli.alicdn.com/install.sh | bash

      - name: Configure Aliyun CLI
        run: |
          aliyun configure set \
            --access-key-id ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }} \
            --region cn-hangzhou

      - name: Install FC CLI plugin
        run: aliyun plugin install --names aliyun-cli-fc

      - name: Tag and push FC timestamp image
        run: |
          ACR="crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft"
          TIMESTAMP_TAG="cpu-$(date +%Y%m%d-%H%M%S)"
          docker tag dmla-sandbox:cpu ${ACR}/dmla-sandbox:${TIMESTAMP_TAG}
          docker push ${ACR}/dmla-sandbox:${TIMESTAMP_TAG}
          echo "FC_TAG=${TIMESTAMP_TAG}" >> $GITHUB_ENV
          echo "✅ Pushed FC timestamp tag: ${TIMESTAMP_TAG}"

      - name: Update FC function image
        run: |
          IMAGE_URI="crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:${FC_TAG}"
          CONFIG='{"image":"'${IMAGE_URI}'","port":9000,"command":["python3","/workspace/fc_handler.py"]}'
          aliyun fc update-function \
            --function-name sandbox-cpu \
            --custom-container-config "$CONFIG"
          echo "✅ FC function updated to ${FC_TAG}"

  summary:
    runs-on: ubuntu-latest
    needs: [build-images, push-dockerhub, push-acr, update-fc]
    if: ${{ always() }}
    steps:
      - name: Summary
        run: |
          echo "## 🐳 Docker 镜像发布完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "- icyfenix/dmla-sandbox:cpu" >> $GITHUB_STEP_SUMMARY
          echo "- icyfenix/dmla-sandbox:gpu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### 阿里云 ACR（国内加速）" >> $GITHUB_STEP_SUMMARY
          echo "- crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:cpu" >> $GITHUB_STEP_SUMMARY
          echo "- crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:gpu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### 阿里云 FC（Serverless 沙箱）" >> $GITHUB_STEP_SUMMARY
          echo "- crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:fc" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 拉取命令" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Docker Hub（全球）' >> $GITHUB_STEP_SUMMARY
          echo 'docker pull icyfenix/dmla-sandbox:gpu' >> $GITHUB_STEP_SUMMARY
          echo 'docker pull icyfenix/dmla-sandbox:cpu' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# 阿里云 ACR（国内加速）' >> $GITHUB_STEP_SUMMARY
          echo 'docker pull crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:gpu' >> $GITHUB_STEP_SUMMARY
          echo 'docker pull crpi-aani1ibpows293b8.cn-hangzhou.personal.cr.aliyuncs.com/fenixsoft/dmla-sandbox:cpu' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY